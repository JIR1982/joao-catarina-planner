<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>João & Catarina Planner</title>

  <!-- PWA -->
  <link rel="manifest" href="/joao-catarina-planner/manifest.json">
  <meta name="theme-color" content="#6a11cb">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      text-align: center;
      padding: 40px;
    }
    a {
      display: block;
      margin: 20px;
      font-size: 22px;
      text-decoration: none;
      color: #0078d4;
    }
    button {
      padding: 12px 20px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
      background: #6a11cb;
      color: white;
      margin-top: 30px;
    }
  </style>
</head>
<body>

  <h1>João & Catarina Planner</h1>

  <a href="/joao-catarina-planner/calendar.html">📅 Calendar</a>
  <a href="/joao-catarina-planner/shopping-list.html">🛒 Shopping List</a>

  <button id="installBtn" hidden>Install App</button>

  <!-- Install button logic (Android) -->
  <script>
    let deferredPrompt;
    const btn = document.getElementById("installBtn");

    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
      btn.hidden = false;

      btn.onclick = () => {
        deferredPrompt.prompt();
        deferredPrompt = null;
        btn.hidden = true;
      };
    });
  </script>

  <!-- Service Worker -->
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/joao-catarina-planner/service-worker.js");
    }
  </script>

</body>
</html>

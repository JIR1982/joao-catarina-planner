<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shared Calendar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 16px;
    }

    h2 {
      text-align: center;
    }

    #header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #monthLabel {
      font-weight: bold;
      font-size: 18px;
    }

    #calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      margin-top: 10px;
    }

    .weekday {
      text-align: center;
      font-weight: bold;
    }

    .day {
      background: white;
      min-height: 90px;
      padding: 6px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }

    .day:hover {
      background: #eaeaff;
    }

    .date {
      font-weight: bold;
      margin-bottom: 4px;
    }

    .event {
      background: #6a11cb;
      color: white;
      padding: 2px 4px;
      border-radius: 4px;
      margin-bottom: 2px;
      font-size: 11px;
    }

    a {
      display: block;
      text-align: center;
      margin-top: 16px;
      text-decoration: none;
      color: #0078d4;
    }
  </style>
</head>

<body>

<h2>Shared Calendar</h2>

<div id="header">
  <button id="prev">◀</button>
  <div id="monthLabel"></div>
  <button id="next">▶</button>
</div>

<div id="calendar"></div>

<a href="./index.html">⬅ Back</a>

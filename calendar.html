<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar</title>

<link rel="manifest" href="/joao-catarina-planner/manifest.json">
<meta name="theme-color" content="#6a11cb">

<style>
  body { font-family: Arial; padding: 30px; }
  input, button { padding: 10px; font-size: 16px; }
</style>
</head>
<body>

<h2>Shared Calendar</h2>

<input id="eventText" placeholder="Event name">
<button id="addBtn">Add</button>

<ul id="events"></ul>

<p><a href="/joao-catarina-planner/index.html">⬅ Back</a></p>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "shared-joao-catarina.firebaseapp.com",
    databaseURL: "https://shared-joao-catarina-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "shared-joao-catarina",
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const ref = db.ref("calendarEvents");

  const list = document.getElementById("events");

  ref.on("value", snap => {
    list.innerHTML = "";
    (snap.val() || []).forEach(text => {
      const li = document.createElement("li");
      li.textContent = text;
      list.appendChild(li);
    });
  });

  document.getElementById("addBtn").onclick = () => {
    const text = eventText.value.trim();
    if (!text) return;

    ref.transaction(arr => (arr || []).concat(text));
    eventText.value = "";
  };
</script>

<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/joao-catarina-planner/service-worker.js");
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar</title>

<link rel="manifest" href="/joao-catarina-planner/manifest.json">
<meta name="theme-color" content="#6a11cb">

<style>
  body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    padding: 16px;
  }

  h2 { text-align: center; }

  #header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  #calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
  }

  .weekday {
    text-align: center;
    font-weight: bold;
  }

  .day {
    background: white;
    min-height: 100px;
    padding: 6px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    position: relative;
  }

  .day.weekend { background: #f0f0f0; }

  .day.today {
    border: 2px solid #6a11cb;
  }

  .date {
    font-weight: bold;
    margin-bottom: 6px;
  }

  .event {
    background: #6a11cb;
    color: white;
    padding: 3px 5px;
    border-radius: 4px;
    margin-bottom: 3px;
    font-size: 11px;
  }

  .event:hover {
    opacity: 0.9;
  }

  a {
    display: block;
    text-align: center;
    margin-top: 16px;
  }
</style>
</head>

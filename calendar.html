<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Monthly Calendar</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body { font-family: Arial, sans-serif; background:#f4f4f4; padding:16px; }
  h2 { text-align:center; }

  #header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
  }

  #calendar {
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:6px;
  }

  .day-header {
    font-weight:bold;
    text-align:center;
  }

  .day {
    background:white;
    min-height:90px;
    padding:6px;
    border-radius:6px;
    cursor:pointer;
    position:relative;
  }

  .day.other-month { opacity:0.3; }
  .day.today { border:2px solid #6a11cb; }
  .day.selected { background:#eaeaff; }

  .day-number { font-weight:bold; }

  .task-indicator {
    display:flex;
    margin-top:4px;
    gap:3px;
  }

  .task-dot {
    width:8px;
    height:8px;
    border-radius:50%;
  }

  #tasks {
    margin-top:16px;
    background:white;
    padding:10px;
    border-radius:8px;
  }

  .task-item {
    border-left:6px solid;
    padding:6px;
    margin-bottom:8px;
  }

  .delete-btn {
    background:red;
    color:white;
    border:none;
    padding:4px 6px;
    cursor:pointer;
  }
</style>
</head>

<body>

<h2 id="current-month-year"></h2>

<div id="header">
  <button id="prev-month">◀</button>
  <button id="next-month">▶</button>
</div>

<div id="calendar"></div>

<div id="tasks">
  <div id="selected-date"></div>

  <input id="task-title" placeholder="Task title">
  <input id="task-description" placeholder="Description">

  <select id="task-category">
    <option value="joao">João</option>
    <option value="catarina">Catarina</option>
    <option value="kids">Kids</option>
    <option value="all">All</option>
  </select>

  <button id="add-task">Add Task</button>

  <div id="task-list"></div>
</div>

<!-- ✅ Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
/* ---------- Firebase setup ---------- */
const firebaseConfig = {
  apiKey: "AIzaSyCcdM3IhHEnTy9WR4wAaJkbKA_2BcqPqCw",
  authDomain: "shared-joao-catarina.firebaseapp.com",
  databaseURL: "https://shared-joao-catarina-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "shared-joao-catarina",
};
firebase.initializeApp(firebaseConfig);

const db = firebase.database();
const tasksRef = db.ref("calendarTasks");

/* ---------- State ---------- */
let currentDate = new Date();
let selectedDate = new Date();
let tasks = {};

const categoryColors = {
  joao:"#6a11cb",
  catarina:"#2575fc",
  kids:"#00b894",
  all:"#fdcb6e"
};

/* ---------- Helpers ---------- */
function formatDate(d){
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

/* ---------- Firebase sync ---------- */
tasksRef.on("value", snap => {
  tasks = snap.val() || {};
  renderCalendar();
  updateTaskList();
});

/* ---------- Calendar rendering ---------- */
function renderCalendar(){
  const cal = document.getElementById("calendar");
  cal.innerHTML = "";

  document.getElementById("current-month-year").textContent =
    currentDate.toLocaleString("en-US",{month:"long",year:"numeric"});

  const days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  days.forEach(d=>{
    const el=document.createElement("div");
    el.className="day-header";
    el.textContent=d;
    cal.appendChild(el);
  });

  const first = new Date(currentDate.getFullYear(),currentDate.getMonth(),1);
  const last = new Date(currentDate.getFullYear(),currentDate.getMonth()+1,0);

  for(let i=0;i<first.getDay();i++){
    cal.appendChild(document.createElement("div"));
  }

  for(let d=1; d<=last.getDate(); d++){
    const date=new Date(currentDate.getFullYear(),currentDate.getMonth(),d);
    const key=formatDate(date);

    const box=document.createElement("div");
    box.className="day";

    if(formatDate(date)===formatDate(new Date())) box.classList.add("today");
    if(selectedDate && formatDate(date)===formatDate(selectedDate)) box.classList.add("selected");

    box.innerHTML=`<div class="day-number">${d}</div>`;

    (tasks[key]||[]).forEach(t=>{
      const dot=document.createElement("div");
      dot.className="task-dot";
      dot.style.background=categoryColors[t.category];
      box.appendChild(dot);
    });

    box.onclick=()=>{ selectedDate=date; renderCalendar(); updateTaskList(); };
    cal.appendChild(box);
  }
}

/* ---------- Task list ---------- */
function updateTaskList(){
  const list=document.getElementById("task-list");
  list.innerHTML="";
  document.getElementById("selected-date").textContent =
    selectedDate.toDateString();

  const key=formatDate(selectedDate);
  (tasks[key]||[]).forEach((t,i)=>{
    const item=document.createElement("div");
    item.className="task-item";
    item.style.borderColor=categoryColors[t.category];
    item.innerHTML=`<b>${t.title}</b><br>${t.description}<br>`;
    const del=document.createElement("button");
    del.className="delete-btn";
    del.textContent="Delete";
    del.onclick=()=>{
      tasks[key].splice(i,1);
      if(tasks[key].length===0) tasksRef.child(key).remove();
      else tasksRef.child(key).set(tasks[key]);
    };
    item.appendChild(del);
    list.appendChild(item);
  });
}

/* ---------- Add task ---------- */
document.getElementById("add-task").onclick=()=>{
  const title=document.getElementById("task-title").value.trim();
  if(!title) return;
  const desc=document.getElementById("task-description").value;
  const cat=document.getElementById("task-category").value;
  const key=formatDate(selectedDate);
  tasksRef.child(key).transaction(arr=>{
    arr=arr||[];
    arr.push({title,description:desc,category:cat});
    return arr;
  });
};
</script>

</body>
</html>

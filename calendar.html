<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Monthly Calendar</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body { font-family: Arial, sans-serif; background:#f4f4f4; padding:16px; }
  h2 { text-align:center; }

  #header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
  }

  #calendar {
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:6px;
  }

  .day-header {
    font-weight:bold;
    text-align:center;
  }

  .day {
    background:white;
    min-height:90px;
    padding:6px;
    border-radius:6px;
    cursor:pointer;
    position:relative;
  }

  .day.today { border:2px solid #6a11cb; }
  .day.selected { background:#eaeaff; }

  .day-number {
    font-weight:bold;
    font-size:14px;
  }

  .task-dot {
    width:8px;
    height:8px;
    border-radius:50%;
    margin-top:4px;
    display:inline-block;
    margin-right:2px;
  }

  #tasks {
    margin-top:16px;
    background:white;
    padding:12px;
    border-radius:8px;
  }

  .task-item {
    border-left:6px solid;
    padding:6px;
    margin-bottom:8px;
  }

  .task-time { font-weight:bold; }

  .delete-btn {
    background:red;
    color:white;
    border:none;
    padding:4px 6px;
    cursor:pointer;
    margin-top:4px;
  }

  input, select {
    width:100%;
    margin-top:6px;
    padding:6px;
  }

  button { margin-top:8px; }
</style>
</head>

<body>

<h2 id="current-month-year"></h2>

<div id="header">
  <button id="prev-month">◀</button>
  <button id="next-month">▶</button>
</div>

<div id="calendar"></div>

<div id="tasks">
  <strong id="selected-date"></strong>

  <input id="task-time" type="time">
  <input id="task-title" placeholder="Task title">
  <input id="task-description" placeholder="Description">

  <select id="task-category">
    <option value="joao">João</option>
    <option value="catarina">Catarina</option>
    <option value="kids">Kids</option>
    <option value="all">All</option>
  </select>

  <button id="save-task">Save Task</button>

  <div id="task-list"></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
/* ---------- Firebase ---------- */
firebase.initializeApp({
  apiKey: "AIzaSyCcdM3IhHEnTy9WR4wAaJkbKA_2BcqPqCw",
  authDomain: "shared-joao-catarina.firebaseapp.com",
  databaseURL: "https://shared-joao-catarina-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "shared-joao-catarina"
});

const db = firebase.database();
const tasksRef = db.ref("calendarTasks");

/* ---------- State ---------- */
let currentDate = new Date();
let selectedDate = new Date();
let tasks = {};
let editingIndex = null;

/* ---------- Colors ---------- */
const colors = {
  joao:"#6a11cb",
  catarina:"#2575fc",
  kids:"#00b894",
  all:"#fdcb6e"
};

/* ---------- Helpers ---------- */
function formatDate(d){
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

/* ---------- Firebase Sync ---------- */
tasksRef.on("value", snap=>{
  tasks = snap.val() || {};
  renderCalendar();
  renderTasks();
});

/* ---------- Calendar ---------- */
function renderCalendar(){
  document.getElementById("calendar").innerHTML = "";
  document.getElementById("current-month-year").textContent =
    currentDate.toLocaleString("en-US",{month:"long",year:"numeric"});

  ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].forEach(d=>{
    const h=document.createElement("div");
    h.className="day-header";
    h.textContent=d;
    calendar.appendChild(h);
  });

  const first=new Date(currentDate.getFullYear(),currentDate.getMonth(),1);
  const last=new Date(currentDate.getFullYear(),currentDate.getMonth()+1,0);

  for(let i=0;i<first.getDay();i++) calendar.appendChild(document.createElement("div"));

  for(let d=1;d<=last.getDate();d++){
    const date=new Date(currentDate.getFullYear(),currentDate.getMonth(),d);
    const key=formatDate(date);
    const el=document.createElement("div");
    el.className="day";

    if(formatDate(date)===formatDate(new Date())) el.classList.add("today");
    if(formatDate(date)===formatDate(selectedDate)) el.classList.add("selected");

    el.innerHTML=`<div class="day-number">${d}</div>`;

    (tasks[key]||[]).forEach(t=>{
      const dot=document.createElement("span");
      dot.className="task-dot";
      dot.style.background=colors[t.category];
      el.appendChild(dot);
    });

    el.onclick=()=>{ selectedDate=date; editingIndex=null; renderCalendar(); renderTasks(); };
    calendar.appendChild(el);
  }
}

/* ---------- Task List ---------- */
function renderTasks(){
  const list=document.getElementById("task-list");
  const key=formatDate(selectedDate);
  list.innerHTML="";
  document.getElementById("selected-date").textContent = selectedDate.toDateString();

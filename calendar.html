<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar</title>

/joao-catarina-planner/manifest.json
<meta name="theme-color" content="#6a11cb">

<style>
  body {
    font-family: Arial, sans-serif;
    padding: 16px;
    background: #f4f4f4;
  }

  h2 {
    text-align: center;
  }

  #header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  #calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }

  .day-name {
    font-weight: bold;
    text-align: center;
  }

  .day {
    background: white;
    min-height: 90px;
    padding: 4px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
  }

  .day:hover {
    background: #eef;
  }

  .date {
    font-weight: bold;
    margin-bottom: 4px;
  }

  .event {
    background: #6a11cb;
    color: white;
    padding: 2px 4px;
    border-radius: 4px;
    margin-bottom: 2px;
    font-size: 11px;
  }

  button {
    padding: 6px 10px;
  }
</style>
</head>

<body>

<h2>Shared Calendar</h2>

<div id="header">
  <button onclick="changeMonth(-1)">◀</button>
  <div id="monthLabel"></div>
  <button onclick="changeMonth(1)">▶</button>
</div>

<div id="calendar"></div>

<p style="text-align:center;margin-top:16px;">
  /joao-catarina-planner/index.html⬅ Back</a>
</p>

<!-- Firebase -->
https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js
https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCcdM3IhHEnTy9WR4wAaJkbKA_2BcqPqCw",
  authDomain: "shared-joao-catarina.firebaseapp.com",
  databaseURL: "https://shared-joao-catarina-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "shared-joao-catarina",
  storageBucket: "shared-joao-catarina.firebasestorage.app",
  messagingSenderId: "113531041537",
  appId: "1:113531041537:web:084fd323fa900295c4cd00"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const eventsRef = db.ref("calendarEvents");

let currentDate = new Date();
let events = {};

// realtime sync
eventsRef.on("value", snap => {
  events = snap.val() || {};
  renderCalendar();
});

function renderCalendar() {
  const calendar = document.getElementById("calendar");
  calendar.innerHTML = "";

  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();

  document.getElementById("monthLabel").textContent =
    currentDate.toLocaleString("default", { month: "long", year: "numeric" });

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  const dayNames = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  dayNames.forEach(d => {
    const div = document.createElement("div");
    div.className = "day-name";
    div.textContent = d;
    calendar.appendChild(div);
  });

  for (let i = 0; i < firstDay; i++) {
    calendar.appendChild(document.createElement("div"));
  }

  for (let day = 1; day <= daysInMonth; day++) {
    const dateKey = `${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;

    const div = document.createElement("div");
    div.className = "day";

    const dateLabel = document.createElement("div");
    dateLabel.className = "date";
    dateLabel.textContent = day;
    div.appendChild(dateLabel);

    (events[dateKey] || []).forEach(e => {
      const ev = document.createElement("div");
      ev.className = "event";
      ev.textContent = e;
      div.appendChild(ev);
    });

    div.onclick = () => addEvent(dateKey);
    calendar.appendChild(div);
  }
}

function addEvent(dateKey) {
  const text = prompt("Add event:");
  if (!text) return;

  eventsRef.child(dateKey).transaction(arr => {
    if (!arr) return [text];
    arr.push(text);
    return arr;
  });
}

function changeMonth(delta) {
  currentDate.setMonth(currentDate.getMonth() + delta);
  renderCalendar();
}

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/joao-catarina-planner/service-worker.js");
}
</script>

</body>
</html>

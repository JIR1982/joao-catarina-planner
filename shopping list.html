<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping List</title>

<link rel="manifest" href="/joao-catarina-planner/manifest.json">
<meta name="theme-color" content="#6a11cb">

<style>
  body { font-family: Arial; padding: 30px; }
  input, button { padding: 10px; font-size: 16px; }
  li { cursor: pointer; }
</style>
</head>
<body>

<h2>Shopping List</h2>

<input id="itemText" placeholder="Item">
<button id="addBtn">Add</button>

<ul id="items"></ul>

<p><a href="/joao-catarina-planner/index.html">⬅ Back</a></p>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCcdM3IhHEnTy9WR4wAaJkbKA_2BcqPqCw",
    authDomain: "shared-joao-catarina.firebaseapp.com",
    databaseURL: "https://shared-joao-catarina-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "shared-joao-catarina",
    storageBucket: "shared-joao-catarina.firebasestorage.app",
    messagingSenderId: "113531041537",
    appId: "1:113531041537:web:084fd323fa900295c4cd00"
  };

  firebase.initializeApp(firebaseConfig);

  const db = firebase.database();
  const ref = db.ref("shoppingList");
  const list = document.getElementById("items");

  ref.on("value", snap => {
    list.innerHTML = "";
    (snap.val() || []).forEach((item, i) => {
      const li = document.createElement("li");
      li.textContent = item;
      li.onclick = () => removeItem(i);
      list.appendChild(li);
    });
  });

  function removeItem(i) {
    ref.once("value", snap => {
      const arr = snap.val() || [];
      arr.splice(i, 1);
      ref.set(arr);
    });
  }

  document.getElementById("addBtn").onclick = () => {
    const text = itemText.value.trim();
    if (!text) return;
    ref.transaction(arr => (arr || []).concat(text));
    itemText.value = "";
  };
</script>

<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/joao-catarina-planner/service-worker.js");
  }
</script>

</body>
</html>
